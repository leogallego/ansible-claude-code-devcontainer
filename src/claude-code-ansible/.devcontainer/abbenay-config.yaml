# Abbenay — AI Provider Gateway Configuration
# Providers use environment variables for API keys (no keychain in containers).
# Edit this file or mount your own at /root/.config/abbenay/config.yaml
# Changes to this file are lost on container rebuild.

providers:
  # Anthropic via Vertex AI (uses gcloud ADC from mounted ~/.config/gcloud)
  # Requires GOOGLE_VERTEX_PROJECT and GOOGLE_VERTEX_LOCATION env vars
  vertex-claude:
    engine: vertex-anthropic
    models:
      claude-sonnet-4:
        model_id: "claude-sonnet-4@20250514"

  # Anthropic direct API (uses ANTHROPIC_API_KEY)
  # anthropic:
  #   engine: anthropic
  #   api_key_env_var_name: "ANTHROPIC_API_KEY"
  #   models:
  #     claude-sonnet-4-20250514: {}

  # OpenRouter — single key for 200+ models from multiple providers
  # openrouter:
  #   engine: openrouter
  #   api_key_env_var_name: "OPENROUTER_API_KEY"
  #   models:
  #     google/gemini-2.5-pro-preview: {}
  #     anthropic/claude-sonnet-4: {}

  # Google Gemini — direct access
  # gemini:
  #   engine: google
  #   api_key_env_var_name: "GOOGLE_GENERATIVE_AI_API_KEY"
  #   models:
  #     gemini-2.5-pro: {}

  # Local Ollama (no API key required)
  # ollama:
  #   engine: ollama
  #   base_url: "http://host.containers.internal:11434"
  #   models:
  #     llama3.2: {}
